# Decision Coverage Matrix — All 12 Skill Routers
# Generated: 2026-03-07
# Source: transcript-analyst parallel analysis of 14 courses (2,318 skills with routers)
#
# Legend:
#   deep: Primary domain, extensive skill coverage (5+ skills)
#   partial: Secondary coverage, some skills touch this decision (1-4 skills)
#   not_covered: No skills address this decision
#
# Each router lists: decisions_answered, decisions_not_covered, and cross_references
# Cross-references point to the router that BEST answers a gap

routers:

  rs-full-stack:
    courses: [full-stack]
    total_skills: 1072
    role: "Generalista — unico router que toca todas as 15 decisoes"
    decisions:
      D0_SOLUTION_TYPE: deep        # fullstack_web, api_backend
      D1_RUNTIME: deep              # node_js
      D1_FRAMEWORK_WEB: deep        # react_spa, no_framework (vanilla HTML/CSS/JS)
      D1_ARCHITECTURE: partial      # monolith (implicit, no DDD/Clean Arch)
      D1_INFRA_PLATFORM: partial    # docker basics only
      D2_NODE_FRAMEWORK: deep       # express (no fastify/nestjs)
      D3_DATA_LAYER: deep           # sql, in_memory, file_system
